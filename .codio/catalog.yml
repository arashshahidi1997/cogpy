# Codio library catalog — project-agnostic identity metadata
# Absorbed from pixecog/docs/reference/codelib/code-lib.registry.yml
# See: codio vocab --field kind  for allowed values
libraries:
  # === Internal ===
  cogpy:
    kind: internal
    language: python
    path: src/cogpy
    summary: Primary ECoG/iEEG signal processing toolkit — IO, preprocessing, spectral, detection, pipelines

  labbox:
    kind: utility
    language: python
    summary: General lab utilities and shared tooling — pipeline helpers, reusable infrastructure

  # === Tier 1 external — core runtime dependencies ===
  fooof:
    kind: external_mirror
    language: python
    pip_name: specparam
    license: Apache-2.0
    summary: Spectral parameterization — aperiodic (1/f) + periodic peak modeling

  neurodsp:
    kind: external_mirror
    language: python
    pip_name: neurodsp
    license: Apache-2.0
    summary: Neural signal processing — filtering, spectral analysis, burst detection

  mne-python:
    kind: external_mirror
    language: python
    pip_name: mne
    license: BSD-3-Clause
    summary: Comprehensive neurophys analysis framework — data structures, IO, visualization

  ghostipy:
    kind: external_mirror
    language: python
    pip_name: ghostipy
    license: BSD-3-Clause
    summary: Time-frequency analysis — multitaper spectrograms via FFTW

  # === Tier 2 external — runtime or algorithm reference ===
  antropy:
    kind: external_mirror
    language: python
    pip_name: antropy
    license: BSD-3-Clause
    summary: Complexity and entropy measures — sample entropy, LZ complexity, permutation entropy, DFA

  nolds:
    kind: external_mirror
    language: python
    pip_name: nolds
    license: MIT
    summary: Nonlinear dynamics measures — Hurst exponent, DFA, Lyapunov, correlation dimension

  nitime:
    kind: external_mirror
    language: python
    pip_name: nitime
    license: BSD-3-Clause
    summary: Time-series analysis — spectral estimation, coherence, cross-correlation

  tensorpac:
    kind: external_mirror
    language: python
    pip_name: tensorpac
    license: BSD-3-Clause
    summary: Phase-amplitude coupling — modulation index, comodulograms

  pactools:
    kind: external_mirror
    language: python
    pip_name: pactools
    license: BSD-3-Clause
    summary: Phase-amplitude coupling estimators and validation

  elephant:
    kind: external_mirror
    language: python
    pip_name: elephant
    license: BSD-3-Clause
    summary: Electrophysiology analysis — spike trains, cross-correlation, Granger causality

  yasa:
    kind: external_mirror
    language: python
    pip_name: yasa
    license: BSD-3-Clause
    summary: Sleep analysis — band power, event detection (spindles, slow waves)

  emd:
    kind: external_mirror
    language: python
    pip_name: emd
    license: MIT
    summary: Empirical mode decomposition — IMF extraction, alternative signal decomposition

  mne-connectivity:
    kind: external_mirror
    language: python
    pip_name: mne-connectivity
    license: BSD-3-Clause
    summary: Connectivity metrics built on MNE — coherence, spectral connectivity

  mne-features:
    kind: external_mirror
    language: python
    pip_name: mne-features
    license: BSD-3-Clause
    summary: Feature extraction — Hjorth parameters, spectral features, wavelet features

  meegkit:
    kind: external_mirror
    language: python
    pip_name: meegkit
    license: BSD-3-Clause
    summary: M/EEG artifact handling and denoising

  multitaper_toolbox:
    kind: external_mirror
    language: python
    pip_name: multitaper
    license: GPL-3.0
    summary: Spectral estimation reference — multitaper PSD and spectrograms

  scikit-image:
    kind: external_mirror
    language: python
    pip_name: scikit-image
    license: BSD-3-Clause
    summary: Image processing — blob detection, morphology, spatial filtering for AP×ML grids

  networkx:
    kind: external_mirror
    language: python
    pip_name: networkx
    license: BSD-3-Clause
    summary: Graph algorithms and data structures — connectivity, clustering, centrality

  # === Tier 2 external — MATLAB reference (never imported) ===
  buzcode:
    kind: external_mirror
    language: matlab
    summary: Buzsáki lab pipeline — ripple/dentate spike detection, LFP preprocessing

  cellexplorer:
    kind: external_mirror
    language: matlab
    summary: Hippocampal analysis — event detection, LFP/spike workflows, Neuroscope concepts

  fieldtrip:
    kind: external_mirror
    language: matlab
    summary: Comprehensive MATLAB neurophys toolbox — filtering, time-frequency, preprocessing

  hippocookbook:
    kind: external_mirror
    language: matlab
    summary: Curated hippocampal analysis recipes — algorithm references, workflow design

  # === Tier 3 external — occasional use ===
  allensdk:
    kind: external_mirror
    language: python
    pip_name: allensdk
    license: BSD-3-Clause
    summary: Allen Institute datasets + analysis tools — dataset IO, pipeline patterns

  braindecode:
    kind: external_mirror
    language: python
    pip_name: braindecode
    license: BSD-3-Clause
    summary: Deep learning for EEG/ECoG — dataset wrappers, training patterns

  spikeinterface:
    kind: external_mirror
    language: python
    pip_name: spikeinterface
    license: MIT
    summary: Spike sorting ecosystem — pipeline patterns, data abstraction

  pyedflib:
    kind: external_mirror
    language: python
    pip_name: pyedflib
    license: BSD-2-Clause
    summary: EDF file IO reference — interoperability, edge cases
