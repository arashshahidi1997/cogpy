# Codio project profiles — local policy for each library
# See: codio vocab --field priority  for allowed values
profiles:
  # === Internal ===
  cogpy:
    priority: tier1
    runtime_import: internal
    decision_default: existing
    capabilities:
      - io
      - preprocessing
      - filtering
      - spectral
      - detection
      - bad_channel
      - plotting
      - pipelines
      - event_catalog
      - spatial_measures
      - temporal_measures
      - bivariate_measures
    status: active

