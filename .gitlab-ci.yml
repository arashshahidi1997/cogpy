# No image: we're using a shell executor, so jobs run directly on the host
stages:
  - deploy

pages:
  stage: deploy
  rules:
    # only build on the default branch (master/main)
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - |
      set -euo pipefail
      cd "$CI_PROJECT_DIR"

      # Use the shared cogpy environment where Sphinx and its deps are already installed
      CONDA_ENV="/storage/share/python/environments/Anaconda3/envs/cogpy"
      export PATH="$CONDA_ENV/bin:$PATH"

      # Build and collect the docs
      make -C docs html
      rm -rf public
      mkdir -p public
      cp -a docs/build/html/. public/

  artifacts:
    paths:
      - public
