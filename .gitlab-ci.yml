# No image: we're using a shell executor, so jobs run directly on the host

variables:
  UV_CACHE_DIR: .uv_cache
  # Force uv to use its managed Python runtime so distutils is available
  UV_PYTHON_PREFERENCE: only-managed
  # Explicitly point uv at the environment we use locally for building docs
  UV_PYTHON: /storage/share/python/environments/Anaconda3/envs/cogpy/bin/python

stages:
  - deploy

cache:
  key: sphinx-uv-cache
  paths:
    - .uv_cache/

pages:
  stage: deploy
  rules:
    # only build on the default branch (master/main)
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    # 0) Ensure we're in the project directory
    - cd "$CI_PROJECT_DIR"

    # 1) Install uv if not already present
    - if ! command -v uv >/dev/null; then
        curl -LsSf https://astral.sh/uv/install.sh | sh;
      fi
    - export PATH="$HOME/.local/bin:$PATH"

    # 2) Install docs dependencies
    - uv pip install -r docs/requirements.txt

    # 3) Build Sphinx HTML docs into docs/build/html
    - make -C docs html

    # 4) Prepare GitLab Pages artifact from the Sphinx build
    - rm -rf public
    - mkdir -p public
    - cp -a docs/build/html/. public/

  artifacts:
    paths:
      - public
